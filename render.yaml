services:
  - type: web
    name: aipa
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && pip install .
    startCommand: uvicorn aipa.main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop
    healthCheckPath: /health/live
    envVars:
      - key: SUPABASE_DB_URL
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
